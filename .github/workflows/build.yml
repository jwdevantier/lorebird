name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgtksourceview-5-dev
      - name: Test
        run: cargo test --workspace

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-gtksourceview5
            mingw-w64-ucrt-x86_64-ntldd
            zip

      - name: Build
        run: cargo build --release -p loreread

      - name: Bundle
        run: |
          mkdir -p dist
          bash scripts/win-ucr64t-bundler.sh target/release/loreread.exe dist/loreread
          cp icon/org.loreread.app.ico dist/loreread/

      - name: Upload artifact (PRs)
        uses: actions/upload-artifact@v4
        with:
          name: loreread-windows-x86_64
          path: dist/loreread/

      - name: Create zip and upload release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist/loreread
          zip -r ../../../loreread-${{ github.ref_name }}-windows-x86_64.zip *
        # zip uploaded by the release step below

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: loreread-${{ github.ref_name }}-windows-x86_64.zip