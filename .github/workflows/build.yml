name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgtksourceview-5-dev
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-gtksourceview5
            mingw-w64-ucrt-x86_64-ntldd
            zip

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-windows-ucrt64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-windows-ucrt64-

      - name: Build
        run: cargo build --release -p lorebird

      - name: Bundle
        run: |
          mkdir -p dist
          bash scripts/win-ucr64t-bundler.sh target/release/lorebird.exe dist/lorebird
          cp crates/lorebird-gtk/resources/org.lorebird.app.ico dist/lorebird/

      - name: Upload artifact (PRs)
        uses: actions/upload-artifact@v4
        with:
          name: lorebird-windows-x86_64
          path: dist/lorebird/

      - name: Create zip and upload release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist/lorebird
          zip -r ../../../lorebird-${{ github.ref_name }}-windows-x86_64.zip *

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lorebird-${{ github.ref_name }}-windows-x86_64.zip