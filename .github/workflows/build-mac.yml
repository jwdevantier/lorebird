name: Build (macOS)

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS via Nix flake ──────────────────────────────────────────────
  build-nix:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-macos-aarch64-${{ hashFiles('flake.lock') }}
          restore-keys: nix-macos-aarch64-

      - name: Build flake package
        run: nix build .#lorebird --print-build-logs

      - name: Test
        run: nix develop --command cargo test --workspace

      - name: Verify binary exists
        run: |
          result=$(nix path-info .#lorebird)
          test -x "$result/bin/lorebird"
          echo "✅ lorebird binary at $result/bin/lorebird"

  # ── macOS via Homebrew ───────────────────────────────────────────────
  build-brew:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies via Homebrew
        run: brew install gtk4 gtksourceview5 pkg-config

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p lorebird

      - name: Verify binary
        run: |
          test -x target/release/lorebird
          echo "✅ lorebird binary at target/release/lorebird"

      - name: Test
        run: cargo test --workspace