name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml    # reuse all build/test jobs

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # do NOT merge — each artifact stays in its own subdirectory

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release archives
        run: |
          # Windows
          if [ -d artifacts/lorebird-windows-x86_64 ]; then
            cd artifacts/lorebird-windows-x86_64
            zip -r ../../../lorebird-${{ inputs.version }}-windows-x86_64.zip .
            cd -
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          files: |
            lorebird-${{ inputs.version }}-*.tar.gz
            lorebird-${{ inputs.version }}-*.zip
          body: |
            Release ${{ inputs.version }}

            Available binaries:
            - **Windows** (x86_64) — zip (bundled with GTK runtime)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
