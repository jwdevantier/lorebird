name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:               # reusable from release.yml

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux ───────────────────────────────────────────────────────────
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgtksourceview-5-dev
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace

  # ── Windows ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-gtksourceview5
            mingw-w64-ucrt-x86_64-ntldd
            zip

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-windows-ucrt64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-windows-ucrt64-

      - name: Build
        run: cargo build --release -p lorebird

      - name: Bundle
        run: |
          mkdir -p dist
          bash scripts/win-ucr64t-bundler.sh target/release/lorebird.exe dist/lorebird
          cp crates/lorebird-gtk/resources/org.lorebird.app.ico dist/lorebird/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorebird-windows-x86_64
          path: dist/lorebird/

  # ── macOS via Nix flake ──────────────────────────────────────────────
  build-mac-nix:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-macos-aarch64-${{ hashFiles('flake.lock') }}
          restore-keys: nix-macos-aarch64-

      - name: Build flake package
        run: nix build .#lorebird --print-build-logs

      - name: Test
        run: nix develop --command cargo test --workspace

  # ── macOS via Homebrew ───────────────────────────────────────────────
  build-mac-brew:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies via Homebrew
        run: brew install gtk4 gtksourceview5 pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p lorebird
      - name: Test
        run: cargo test --workspace
